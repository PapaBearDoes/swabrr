# ============================================================================
# Swabrr — GitHub Actions Workflow
# ============================================================================
# FILE VERSION: v1.0.0
# Repository: https://github.com/PapaBearDoes/swabrr
# ============================================================================
#
# Builds and pushes Swabrr Docker images to GHCR:
#   - swabrr-api  (Python / FastAPI + scoring engine)
#   - swabrr-web  (Node / Next.js dashboard)
#
# On main branch: after all images are built, deploys to the K8s cluster
# on Lofn via SSH → kubectl rolling update.
#
# Uses Docker layer caching to speed up builds.
#
# Required GitHub Secrets:
#   GITHUB_TOKEN          — automatic, for GHCR push
#   LOFN_SSH_KEY          — private SSH key for deploy user on Lofn
#   LOFN_SSH_USER         — SSH username on Lofn
#
# GHCR Pull Access (private repo):
#   Since this repo is private, GHCR packages are also private.
#   Lofn needs a pull credential to access the images:
#
#   Option A (Docker Compose on Lofn):
#     docker login ghcr.io -u PapaBearDoes -p <PAT with read:packages>
#
#   Option B (K8s on Lofn):
#     kubectl create secret docker-registry ghcr-pull-secret \
#       --namespace=swabrr \
#       --docker-server=ghcr.io \
#       --docker-username=PapaBearDoes \
#       --docker-password=<PAT with read:packages>
#     Then add imagePullSecrets to each deployment spec.
#
# Deploy connectivity:
#   GitHub Actions → SSH → Lofn (10.20.30.253) → kubectl
#
# ============================================================================

name: Build and Push Swabrr Images

on:
  push:
    branches: [main, "dev/**", "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - component: api
            image: ghcr.io/papabeardoes/swabrr-api
            context: ./api
          - component: web
            image: ghcr.io/papabeardoes/swabrr-web
            context: ./web

    steps:
      # =====================================================================
      # Setup
      # =====================================================================
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          echo "🧹 Cleaning up disk space..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      # =====================================================================
      # Docker Setup
      # =====================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # =====================================================================
      # Build and Push
      # =====================================================================
      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =====================================================================
      # Summary
      # =====================================================================
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "## 🐳 ${{ matrix.component }} image built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ matrix.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # =====================================================================
  # Deploy to K8s on Lofn (main branch only)
  # =====================================================================
