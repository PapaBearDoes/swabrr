# ============================================================================
# Swabrr — Docker Compose
# ============================================================================
# FILE VERSION: v1.0.0
# LAST MODIFIED: 2026-04-01
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # swabrr-db — PostgreSQL 17
  # --------------------------------------------------------------------------
  swabrr-db:
    image: postgres:17-alpine
    container_name: swabrr-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SWABRR_DB_NAME:-swabrr}
      POSTGRES_USER: ${SWABRR_DB_USER:-swabrr}
      POSTGRES_PASSWORD_FILE: /run/secrets/swabrr_db_password
    secrets:
      - swabrr_db_password
    volumes:
      - swabrr-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SWABRR_DB_USER:-swabrr}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # swabrr-api — FastAPI + Scoring Engine
  # --------------------------------------------------------------------------
  swabrr-api:
    image: ghcr.io/papabeardoes/swabrr-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: swabrr-api
    restart: unless-stopped
    depends_on:
      swabrr-db:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-America/Los_Angeles}
      SWABRR_LOG_LEVEL: ${SWABRR_LOG_LEVEL:-INFO}
      SWABRR_LOG_FORMAT: ${SWABRR_LOG_FORMAT:-human}
      SWABRR_DB_HOST: swabrr-db
      SWABRR_DB_PORT: ${SWABRR_DB_PORT:-5432}
      SWABRR_DB_NAME: ${SWABRR_DB_NAME:-swabrr}
      SWABRR_DB_USER: ${SWABRR_DB_USER:-swabrr}
      SWABRR_TMDB_REGION: ${SWABRR_TMDB_REGION:-US}
      SWABRR_SCORE_CRON: ${SWABRR_SCORE_CRON:-0 3 * * 0}
      SWABRR_API_HOST: ${SWABRR_API_HOST:-0.0.0.0}
      SWABRR_API_PORT: ${SWABRR_API_PORT:-8484}
      SWABRR_HTTP_TIMEOUT: ${SWABRR_HTTP_TIMEOUT:-30}
      SWABRR_HTTP_RETRIES: ${SWABRR_HTTP_RETRIES:-3}
    secrets:
      - swabrr_db_password
      - swabrr_encryption_key
    ports:
      - "${SWABRR_API_PORT:-8484}:8484"

  # --------------------------------------------------------------------------
  # swabrr-web — Next.js Dashboard
  # --------------------------------------------------------------------------
  swabrr-web:
    image: ghcr.io/papabeardoes/swabrr-web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: swabrr-web
    restart: unless-stopped
    depends_on:
      - swabrr-api
    environment:
      NEXT_PUBLIC_API_URL: http://swabrr-api:8484
    ports:
      - "3000:3000"

# ----------------------------------------------------------------------------
# Secrets
# ----------------------------------------------------------------------------
secrets:
  swabrr_db_password:
    file: ./api/secrets/swabrr_db_password
  swabrr_encryption_key:
    file: ./api/secrets/swabrr_encryption_key

# ----------------------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------------------
volumes:
  swabrr-db-data:
